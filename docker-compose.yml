version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: ppai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ppai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ppaipass}
      POSTGRES_DB: ${POSTGRES_DB:-placementprep}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-ppai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ppai_redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: {context: ./backend, dockerfile: Dockerfile}
    container_name: ppai_backend
    ports: ["8000:8000"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ppai}:${POSTGRES_PASSWORD:-ppaipass}@db:5432/${POSTGRES_DB:-placementprep}
      REDIS_URL: redis://redis:6379/0
    volumes: [./backend:/app, resume_uploads:/app/uploads/resumes]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  resume_uploads:
